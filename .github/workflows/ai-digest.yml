
  name: AI Digest

  on:
    schedule:
      - cron: "0 6 * * *"
    workflow_dispatch:

  jobs:
    digest:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Run digest
          env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          run: python3 telegram-ai-digest/ai_digest.py --limit 8 --telegram
